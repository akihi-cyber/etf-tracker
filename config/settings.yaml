# ============================================
# ETF/基金追踪配置中心
# 修改此文件后 commit & push 即可生效
# ============================================

schedule:
  # 运行时间（北京时间）。建议设 20:00 以后，此时基金净值已基本公布
  time: "17:00"
  timezone: "Asia/Shanghai"

# 要追踪的基金/ETF
funds:
  - code: "001917"
    name: "招商量化精选股票A"
    type: fund
  - code: "019305"
    name: "摩根标普500指数(QDII)人民币C"
    type: fund
  - code: "006479"
    name: "广发纳斯达克100ETF联接(QDII)C"
    type: fund
  - code: "022460"
    name: "易方达中证A500ETF联接C"
    type: fund
  - code: "011609"
    name: "易方达上证科创50ETF联接C"
    type: fund

# --- 想加真正的 ETF（盘中价）？加下面这样 ---
#  - code: "510300"
#    name: "华泰柏瑞沪深300ETF"
#    type: etf        # etf 类型走行情 API，显示收盘价/涨跌幅/成交量
#  - code: "159949"
#    name: "华安创业板50ETF"
#    type: etf

# ============================================
# 大盘指数跟踪（新增）
# 自动获取所持基金对应的宽基指数行情，
# 以及黄金等商品行情，用于对比分析。
# ============================================

# 宽基指数
indices:
  - code: "000688"
    name: "上证科创50"
    market: "cn_index"          # 中国A股指数
  - code: "000510"
    name: "中证A500"
    market: "cn_index"          # 中国A股指数
  - code: "^GSPC"
    name: "标普500"
    market: "us_index"         # 美股指数（雅虎财经）
  - code: "^NDX"
    name: "纳斯达克100"
    market: "us_index"         # 美股指数（雅虎财经）

# 商品行情
commodities:
  - code: "AU9999"
    name: "黄金现货(Au99.99)"
    market: "cn_gold"          # 上金所黄金（东方财富）

# AI 分析（可选，填 false 或留空关闭）
ai_analysis:
  enabled: true
  provider: "deepseek"
  api_key_env: "AI_API_KEY"
  prompt: >
    请综合今日基金净值、大盘指数和黄金行情进行分析：
    1. 基金今日净值整体表现如何？涨跌原因可能是什么？
    2. 对应宽基指数（科创50、中证A500、标普500、纳斯达克100）
       今日表现如何？成交量有无异常？
    3. 黄金行情今日如何？对避险情绪有何提示？
    4. 短期趋势判断（1-2周维度）和调仓建议

# 交叉验证设置
validation:
  min_sources: 2          # 至少几个数据源一致才接受
  max_retries: 3          # 每个数据源重试次数
  retry_cooldown: 10      # 重试间隔（秒）

# 邮件设置
email:
  smtp_server: "smtp.office365.com"
  smtp_port: 587
  use_tls: true
  from_env: "OUTLOOK_EMAIL"        # 发件邮箱（从 GitHub Secrets 读取）
  password_env: "OUTLOOK_PASSWORD" # 密码/应用密码（从 GitHub Secrets 读取）
  to: ""                           # 留空则发给发件人自己
  subject_prefix: "[基金日报]"
