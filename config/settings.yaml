  - code: "000688"
    name: "上证科创50"
    market: "cn_index"
  - code: "000510"
    name: "中证A500"
    market: "cn_index"
  - code: "^GSPC"
    name: "标普500"
    market: "us_index"
  - code: "^NDX"
    name: "纳斯达克100"
    market: "us_index"

# 商品行情
commodities:
  - code: "XAU"
    name: "国际金价(人民币/克)"
    market: "cn_gold"

# AI 分析
ai_analysis:
  enabled: true
  provider: "deepseek"
  api_key_env: "AI_API_KEY"
  prompt: >
    请综合今日基金净值、大盘指数和黄金行情进行分析：
    1. 基金今日净值整体表现如何？涨跌原因可能是什么？
    2. 对应宽基指数（科创50、中证A500、标普500、纳斯达克100）
       今日表现如何？成交量有无异常？
    3. 黄金行情今日如何？对避险情绪有何提示？
    4. 短期趋势判断（1-2周维度）和调仓建议
    5. 如有组合风险数据，结合最大回撤和波动率评估当前风险水平。
      考虑定投计划的影响（招商量化、科创50、A500各6元/天；
      标普500、纳指100各10元/天），
      定投对整体风险有何影响？

# 交叉验证设置
validation:
  min_sources: 2
  max_retries: 3
  retry_cooldown: 10

# 邮件设置
email:
  smtp_server: "smtp.office365.com"
  smtp_port: 587
  use_tls: true
  from_env: "OUTLOOK_EMAIL"
  password_env: "OUTLOOK_PASSWORD"
  to: ""
  subject_prefix: "[基金日报]"
