# ============================================
# ETF/基金追踪配置中心
# 修改此文件后 commit & push 即可生效
# ============================================

schedule:
  time: "18:30"
  timezone: "Asia/Shanghai"

# ============================================
# 跟踪基金/ETF（仅用于净值追踪与日报分析）
# ============================================
funds:
  - code: "019305"
    name: "摩根标普500指数(QDII)人民币C"
    type: fund
  - code: "006479"
    name: "广发纳斯达克100ETF联接(QDII)C"
    type: fund
  - code: "022460"
    name: "易方达中证A500ETF联接C"
    type: fund
  - code: "000216"
    name: "华安黄金ETF联接A"
    type: fund
  - code: "007339"
    name: "易方达沪深300ETF联接C"
    type: fund
  - code: "020065"
    name: "西部利得科技创新混合C"
    type: fund
  - code: "005698"
    name: "华夏全球科技先锋混合（QDII）A"
    type: fund
# ============================================
# 大盘指数跟踪（基准对比）
# ============================================
indices:
  - code: "000688"
    name: "上证科创50"
    market: "cn_index"
  - code: "000510"
    name: "中证A500"
    market: "cn_index"
  - code: "^GSPC"
    name: "标普500"
    market: "us_index"
  - code: "^NDX"
    name: "纳斯达克100"
    market: "us_index"

# 商品行情
commodities:
  - code: "XAU"
    name: "国际金价(人民币/克)"
    market: "cn_gold"

# AI 分析
ai_analysis:
  enabled: true
  provider: "deepseek"
  api_key_env: "AI_API_KEY"
  prompt: >
    请综合今日基金净值、大盘指数和黄金行情进行分析：
    1. 基金今日净值整体表现如何？涨跌原因可能是什么？
    2. 对应宽基指数（科创50、中证A500、标普500、纳斯达克100）
       今日表现如何？成交量有无异常？
    3. 黄金行情今日如何？对避险情绪有何提示？
    4. 短期趋势判断（1-2周维度）和调仓建议
    5. 如有风险数据，结合最大回撤和波动率评估当前风险水平。

# 交叉验证设置
validation:
  min_sources: 2
  max_retries: 3
  retry_cooldown: 10

# 邮件设置
email:
  smtp_server: "smtp.office365.com"
  smtp_port: 587
  use_tls: true
  from_env: "OUTLOOK_EMAIL"
  password_env: "OUTLOOK_PASSWORD"
  to: ""
  subject_prefix: "[基金日报]"
