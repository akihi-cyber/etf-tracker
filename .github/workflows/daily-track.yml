name: ETF 日报追踪

on:
  # 定时触发（北京时间 20:00 = UTC 12:00）
  schedule:
    - cron: '0 12 * * 1-5'   # 周一到周五 UTC 12:00 = CST 20:00
  # 也可手动触发
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行追踪脚本
        env:
          OUTLOOK_EMAIL: ${{ secrets.OUTLOOK_EMAIL }}
          OUTLOOK_PASSWORD: ${{ secrets.OUTLOOK_PASSWORD }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python src/main.py

      - name: 提交数据存档
        run: |
          git config user.name "ETF Bot"
          git config user.email "etf-bot@users.noreply.github.com"
          git add data/
          # 如果有新的日报才 commit
          git diff --cached --quiet || git commit -m "📊 自动日报 $(date +'%Y-%m-%d')"
          git push
