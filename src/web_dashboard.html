<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF Tracker 仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f1117;color:#e1e4e8}
.container{max-width:1000px;margin:0 auto;padding:20px}
header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;padding:16px 0;border-bottom:1px solid #21262d;margin-bottom:24px}
header h1{font-size:22px;color:#f0f6fc}header h1 span{color:#58a6ff}.header-meta{font-size:13px;color:#8b949e}
.chart-container{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin-bottom:24px}
.chart-container h3{font-size:15px;margin-bottom:16px;color:#f0f6fc}
.chart-wrapper{position:relative;height:400px}
.loading{text-align:center;padding:60px 20px;color:#8b949e}
.loading .spinner{width:36px;height:36px;border:3px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:background .2s}
.btn:hover{background:#30363d}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#1f6feb;border-color:#1f6feb;color:#fff}.btn-primary:hover{background:#388bfd}
.toast{position:fixed;bottom:24px;right:24px;z-index:2000;background:#1c2128;border:1px solid #30363d;border-radius:8px;padding:12px 20px;font-size:13px;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}.toast.success{border-left:3px solid #3fb950}.toast.error{border-left:3px solid #f85149}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📊 <span>ETF</span> Tracker</h1>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span class="header-meta" id="headerMeta">加载中...</span>
      <button class="btn btn-primary" onclick="refreshData()" id="refreshBtn">🔄 刷新数据</button>
    </div>
  </header>

  <div class="chart-container">
    <h3>📈 跟踪基金净值走势（等权重组合）</h3>
    <div class="chart-wrapper" id="chartLoading">
      <div class="loading"><div class="spinner"></div><div>正在加载数据...</div></div>
      <canvas id="navChart" style="display:none"></canvas>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let navChart = null, isRefreshing = false;

function toast(msg,type){const e=document.getElementById('toast');e.textContent=msg;e.className='toast '+type+' show';setTimeout(()=>e.classList.remove('show'),3000)}

// ── 加载数据 ──────────────────────────────────────────
async function loadData() {
  try {
    const [sRes, hRes] = await Promise.all([
      fetch('/api/status'),
      fetch('/api/history/nav?days=60')
    ]);
    if (!sRes.ok) throw new Error('API error');
    const s = await sRes.json();
    if (s.status === 'waiting') {
      document.getElementById('chartLoading').innerHTML = '<div class="loading">⏳ 首次获取中（30-60s），请稍后刷新...</div>';
      return;
    }
    const h = await hRes.json();
    document.getElementById('headerMeta').textContent = '📅 ' + (s.date || '').split(' ')[0] + ' · ' + (s.fetched_count || '?') + '/' + (s.funds_count || '?');
    renderChart(h);
  } catch(e) {
    document.getElementById('chartLoading').innerHTML = '<div class="loading">暂无缓存数据，点击「刷新数据」<br><span style="font-size:12px">首次运行需要 30-60 秒获取数据</span></div>';
  }
}

async function refreshData() {
  if(isRefreshing) return;
  isRefreshing=true; const btn=document.getElementById('refreshBtn');
  btn.disabled=true; btn.textContent='⏳ 获取中...';
  document.getElementById('chartLoading').innerHTML = '<div class="loading"><div class="spinner"></div><div>正在获取数据...</div></div>';
  try {
    const r=await fetch('/api/refresh',{method:'POST'});
    const j=await r.json();
    toast('✅ 刷新完成 · '+j.fetched+' · '+j.date,'success');
    await loadData();
  } catch(e) { toast('❌ 刷新失败: '+e.message,'error') }
  finally { isRefreshing=false; btn.disabled=false; btn.textContent='🔄 刷新数据' }
}

function renderChart(history) {
  const loading = document.getElementById('chartLoading');
  loading.innerHTML = '<canvas id="navChart"></canvas>';
  const ctx = document.getElementById('navChart').getContext('2d');
  if(navChart) navChart.destroy();

  if(!history.dates || history.dates.length < 2) {
    navChart = new Chart(ctx, {
      type:'line',
      data:{labels:['暂无数据'],datasets:[{data:[0],borderColor:'#58a6ff'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}
    });
    return;
  }

  navChart = new Chart(ctx, {
    type:'line',
    data:{
      labels:history.dates,
      datasets:[{
        label:'组合净值',
        data:history.values,
        borderColor:'#58a6ff',
        backgroundColor:'rgba(88,166,255,0.08)',
        fill:true,
        tension:0.3,
        pointRadius:0,
        borderWidth:2
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#1c2128',
          titleColor:'#f0f6fc',
          bodyColor:'#e1e4e8',
          borderColor:'#30363d',
          borderWidth:1,
          callbacks:{
            label:ctx => ctx.parsed.y.toFixed(2) + '%'
          }
        }
      },
      scales:{
        x:{
          grid:{color:'#21262d',drawBorder:false},
          ticks:{color:'#8b949e',maxTicksLimit:10}
        },
        y:{
          grid:{color:'#21262d',drawBorder:false},
          ticks:{color:'#8b949e',callback:v => v.toFixed(1) + '%'}
        }
      }
    }
  });
}

loadData();
</script>
</body>
</html>
