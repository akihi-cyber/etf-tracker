<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF Tracker 仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0f1117; color: #e1e4e8;
  min-height: 100vh;
}
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 0; border-bottom: 1px solid #21262d; margin-bottom: 24px;
}
header h1 { font-size: 22px; color: #f0f6fc; }
header h1 span { color: #58a6ff; }
.header-meta { font-size: 13px; color: #8b949e; }

.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card {
  background: #161b22; border: 1px solid #30363d; border-radius: 8px;
  padding: 20px; position: relative; overflow: hidden;
}
.card-label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.card-value { font-size: 28px; font-weight: 700; }
.card-value.green { color: #3fb950; }
.card-value.red { color: #f85149; }

.chart-container {
  background: #161b22; border: 1px solid #30363d; border-radius: 8px;
  padding: 20px; margin-bottom: 24px;
}
.chart-container h3 { font-size: 15px; margin-bottom: 16px; color: #f0f6fc; }
.chart-wrapper { position: relative; height: 320px; }

.table-container {
  background: #161b22; border: 1px solid #30363d; border-radius: 8px;
  overflow: hidden; margin-bottom: 24px;
}
.table-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px; border-bottom: 1px solid #30363d;
}
.table-header h3 { font-size: 15px; color: #f0f6fc; }
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left; padding: 12px 16px; font-size: 12px;
  color: #8b949e; text-transform: uppercase; letter-spacing: 0.3px;
  border-bottom: 1px solid #21262d;
}
td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #21262d; }
tr:hover td { background: #1c2128; }
.text-right { text-align: right; }
.text-green { color: #3fb950; }
.text-red { color: #f85149; }
.text-muted { color: #8b949e; }
.bold { font-weight: 600; }

.loading {
  text-align: center; padding: 60px 20px; color: #8b949e;
}
.loading .spinner {
  width: 36px; height: 36px; border: 3px solid #30363d;
  border-top-color: #58a6ff; border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.btn {
  background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
  padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px;
  transition: background 0.2s;
}
.btn:hover { background: #30363d; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
.btn-primary:hover { background: #388bfd; }

.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: #1c2128; border: 1px solid #30363d; border-radius: 8px;
  padding: 12px 20px; font-size: 13px; color: #e1e4e8;
  opacity: 0; transition: opacity 0.3s; z-index: 999;
}
.toast.show { opacity: 1; }
.toast.success { border-left: 3px solid #3fb950; }
.toast.error { border-left: 3px solid #f85149; }

@media (max-width: 768px) {
  .cards { grid-template-columns: 1fr 1fr; }
  .table-container { overflow-x: auto; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📊 <span>ETF</span> Tracker</h1>
    <div>
      <span class="header-meta" id="headerMeta">加载中...</span>
      <button class="btn btn-primary" onclick="refreshData()" id="refreshBtn" style="margin-left:12px">🔄 刷新数据</button>
    </div>
  </header>

  <div class="cards" id="summaryCards">
    <div class="card"><div class="card-label">总投入</div><div class="card-value" id="totalCost">—</div></div>
    <div class="card"><div class="card-label">总市值</div><div class="card-value" id="totalValue">—</div></div>
    <div class="card"><div class="card-label">总盈亏</div><div class="card-value" id="totalPnl">—</div></div>
    <div class="card"><div class="card-label">数据时效</div><div class="card-value" id="dataFresh" style="font-size:16px">—</div></div>
  </div>

  <div class="chart-container">
    <h3>📈 组合净值走势</h3>
    <div class="chart-wrapper"><canvas id="portfolioChart"></canvas></div>
  </div>

  <div class="table-container" id="holdingsTable">
    <div class="table-header">
      <h3>📦 持仓明细</h3>
      <span class="text-muted" id="holdingsCount" style="font-size:13px"></span>
    </div>
    <div class="loading" id="holdingsLoading">
      <div class="spinner"></div>
      <div>正在加载数据...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let portfolioChart = null;
let isRefreshing = false;

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 3000);
}

async function loadFromCache() {
  try {
    const [pRes, hRes] = await Promise.all([
      fetch('/api/portfolio'),
      fetch('/api/history/portfolio?days=60'),
    ]);
    if (!pRes.ok) throw new Error('API error');
    const p = await pRes.json();
    const h = await hRes.json();
    renderAll(p, h);
  } catch (e) {
    document.getElementById('holdingsLoading').innerHTML =
      `<div class="loading">暂无缓存数据，点击「刷新数据」首次获取</div>`;
    document.getElementById('headerMeta').textContent = '待首次刷新';
  }
}

async function refreshData() {
  if (isRefreshing) return;
  isRefreshing = true;
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 获取中... (30-60s)';
  document.getElementById('holdingsLoading').style.display = 'block';

  try {
    const res = await fetch('/api/refresh', { method: 'POST' });
    const r = await res.json();
    toast(`✅ 刷新完成 · ${r.fetched} · ${r.date}`, 'success');
    // 重新加载
    await loadFromCache();
  } catch (e) {
    toast('❌ 刷新失败: ' + e.message, 'error');
  } finally {
    isRefreshing = false;
    btn.disabled = false;
    btn.textContent = '🔄 刷新数据';
  }
}

function renderAll(p, h) {
  const pnlClass = p.total_pnl >= 0 ? 'green' : 'red';
  document.getElementById('totalCost').textContent = '¥' + fmt(p.total_cost);
  document.getElementById('totalCost').className = 'card-value';
  document.getElementById('totalValue').textContent = '¥' + fmt(p.total_value);
  document.getElementById('totalValue').className = 'card-value';
  document.getElementById('totalPnl').textContent =
    (p.total_pnl >= 0 ? '+' : '') + '¥' + fmt(p.total_pnl) + ' (' + (p.total_pnl_pct >= 0 ? '+' : '') + p.total_pnl_pct.toFixed(2) + '%)';
  document.getElementById('totalPnl').className = 'card-value ' + pnlClass;
  document.getElementById('dataFresh').textContent = p.date;
  document.getElementById('dataFresh').className = 'card-value';
  document.getElementById('dataFresh').style.fontSize = '16px';
  document.getElementById('headerMeta').textContent =
    '📅 ' + p.date.split(' ')[0] + ' · 基金 ' + p.fetched_count + '/' + p.funds_count;
  renderChart(h);
  renderTable(p.holdings);
}

function renderChart(history) {
  const ctx = document.getElementById('portfolioChart').getContext('2d');
  if (portfolioChart) portfolioChart.destroy();

  if (!history.dates || history.dates.length < 2) {
    portfolioChart = new Chart(ctx, {
      type: 'line',
      data: { labels: ['暂无数据'], datasets: [{ data: [0], borderColor: '#58a6ff' }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
    return;
  }

  portfolioChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: history.dates,
      datasets: [{
        label: '组合净值',
        data: history.values,
        borderColor: '#58a6ff',
        backgroundColor: 'rgba(88, 166, 255, 0.08)',
        fill: true,
        tension: 0.3,
        pointRadius: 0,
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c2128',
          titleColor: '#f0f6fc', bodyColor: '#e1e4e8',
          borderColor: '#30363d', borderWidth: 1,
          callbacks: { label: ctx => ctx.parsed.y.toFixed(2) + '%' }
        }
      },
      scales: {
        x: { grid: { color: '#21262d', drawBorder: false }, ticks: { color: '#8b949e', maxTicksLimit: 10 } },
        y: { grid: { color: '#21262d', drawBorder: false }, ticks: { color: '#8b949e', callback: v => v.toFixed(1) + '%' } }
      }
    }
  });
}

function renderTable(holdings) {
  const container = document.getElementById('holdingsTable');
  const loading = document.getElementById('holdingsLoading');
  loading.style.display = 'none';

  if (!holdings || holdings.length === 0) {
    container.innerHTML = `
      <div class="table-header"><h3>📦 持仓明细</h3></div>
      <div style="padding:40px;text-align:center;color:#8b949e">暂无持仓数据</div>`;
    return;
  }

  let rows = '';
  for (const h of holdings) {
    const pc = h.pnl >= 0 ? 'text-green' : 'text-red';
    const sign = h.pnl >= 0 ? '+' : '';
    const pnlStr = (h.pnl === 0 && h.pnl_pct === 0) ? '—' : sign + '¥' + fmt(h.pnl);
    const pnlPctStr = (h.pnl === 0 && h.pnl_pct === 0) ? '—' : sign + h.pnl_pct.toFixed(2) + '%';
    rows += `<tr>
      <td><b>${esc(h.fund_name)}</b><br><span class="text-muted" style="font-size:12px">${h.fund_code}</span></td>
      <td class="text-right">${h.shares > 0 ? h.shares.toFixed(4) : '—'}</td>
      <td class="text-right">${h.cost_basis > 0 ? '¥' + fmt(h.cost_basis) : '—'}</td>
      <td class="text-right">${h.current_value > 0 ? '¥' + fmt(h.current_value) : '—'}</td>
      <td class="text-right ${pc} bold">${pnlStr}</td>
      <td class="text-right ${pc} bold">${pnlPctStr}</td>
      <td class="text-right">${h.current_nav > 0 ? h.current_nav.toFixed(4) : '—'}</td>
    </tr>`;
  }

  document.querySelector('.table-header span').textContent = '共 ' + holdings.length + ' 只';
  document.querySelector('tbody')?.remove();
  document.querySelector('table')?.remove();

  const table = document.createElement('table');
  table.innerHTML = `<thead><tr>
    <th>基金</th><th class="text-right">份数</th><th class="text-right">投入(¥)</th>
    <th class="text-right">市值(¥)</th><th class="text-right">盈亏(¥)</th>
    <th class="text-right">盈亏%</th><th class="text-right">净值</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
  container.appendChild(table);
}

function fmt(v) { return Math.abs(v).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

loadFromCache();
</script>
</body>
</html>
